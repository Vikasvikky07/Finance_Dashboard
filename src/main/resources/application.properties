spring.application.name=Finance_Dashboard
server.port=${PORT:8090}
server.address=0.0.0.0
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finance_dashboard_v2}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:9908}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${DB_URL:jdbc:postgresql://localhost:5432/finance_dashboard_v2}
spring.flyway.user=${DB_USERNAME:postgres}
spring.flyway.password=${DB_PASSWORD:9908}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

app.jwt.secret=${JWT_SECRET:finance-dashboard-super-secret-key-should-be-at-least-32-bytes}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

server.error.include-message=never
